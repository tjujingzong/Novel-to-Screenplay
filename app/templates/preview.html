{% extends "base.html" %}

{% block title %}剧本编辑器 - Novel to Screenplay{% endblock %}

{% block head %}
<!-- CodeMirror for YAML syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/yaml/yaml.min.js"></script>
<!-- marked.js for Markdown rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
    .CodeMirror {
        height: 60vh;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        font-size: 0.875rem;
    }
    /* Markdown rendered content styles */
    .md-preview {
        line-height: 1.8;
        font-size: 0.95rem;
        color: #1f2937;
    }
    .md-preview h1 { font-size: 1.75rem; font-weight: 700; margin: 1.5rem 0 1rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
    .md-preview h2 { font-size: 1.4rem; font-weight: 700; margin: 1.2rem 0 0.8rem; color: #111827; }
    .md-preview h3 { font-size: 1.15rem; font-weight: 600; margin: 1rem 0 0.6rem; color: #374151; }
    .md-preview p { margin: 0.6rem 0; }
    .md-preview strong { font-weight: 700; color: #111827; }
    .md-preview em { font-style: italic; color: #6b7280; }
    .md-preview hr { border: none; border-top: 1px solid #d1d5db; margin: 1.5rem 0; }
    .md-preview blockquote {
        border-left: 4px solid #3b82f6;
        padding: 0.5rem 1rem;
        margin: 1rem 0;
        background: #f0f9ff;
        color: #1e40af;
        border-radius: 0 0.375rem 0.375rem 0;
    }
    .md-preview ul, .md-preview ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-preview li { margin: 0.25rem 0; }
    .md-preview code {
        background: #f3f4f6;
        padding: 0.125rem 0.375rem;
        border-radius: 0.25rem;
        font-size: 0.85em;
        color: #dc2626;
    }
    .md-preview pre { background: #1f2937; color: #e5e7eb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
    .md-preview pre code { background: transparent; color: inherit; padding: 0; }
    /* Stream output markdown styles (dark bg) */
    .stream-md { line-height: 1.6; font-size: 0.8rem; color: #a7f3d0; }
    .stream-md h1, .stream-md h2, .stream-md h3 { color: #6ee7b7; font-weight: 700; margin: 0.8rem 0 0.4rem; }
    .stream-md h1 { font-size: 1.2rem; border-bottom: 1px solid #374151; padding-bottom: 0.3rem; }
    .stream-md h2 { font-size: 1.05rem; }
    .stream-md h3 { font-size: 0.95rem; }
    .stream-md p { margin: 0.3rem 0; }
    .stream-md strong { color: #bbf7d0; }
    .stream-md em { color: #86efac; }
    .stream-md hr { border: none; border-top: 1px solid #374151; margin: 0.6rem 0; }
    .stream-md blockquote { border-left: 3px solid #6ee7b7; padding-left: 0.5rem; color: #86efac; margin: 0.5rem 0; }
    .stream-md ul, .stream-md ol { padding-left: 1.2rem; margin: 0.3rem 0; }
    .stream-md code { background: #374151; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
    .stream-md pre { background: #111827; padding: 0.5rem; border-radius: 0.375rem; overflow-x: auto; margin: 0.5rem 0; }
    .stream-md pre code { background: transparent; padding: 0; }
</style>
{% endblock %}

{% block content %}
<div class="space-y-4">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-800">剧本编辑器</h2>
        <a href="/" class="inline-flex items-center gap-1.5 text-sm text-indigo-600 hover:text-indigo-800 font-medium">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            返回首页
        </a>
    </div>

    <!-- Tab Navigation -->
    <div class="card p-0 overflow-hidden">
        <div class="flex border-b border-gray-200 bg-gray-50">
            <button class="tab-btn active px-6 py-3 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 bg-white"
                    data-tab="yaml-edit">
                YAML 编辑
            </button>
            <button class="tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors"
                    data-tab="suggestions">
                AI 建议修改
            </button>
            <button class="tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors"
                    data-tab="screenplay">
                正式剧本
            </button>
        </div>

        <!-- Tab: YAML Edit (CodeMirror) -->
        <div id="tab-yaml-edit" class="tab-content p-4">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm text-gray-500">直接编辑 YAML 内容，保存后生效</span>
                <div class="flex gap-2">
                    <button id="yaml-save-btn"
                            class="bg-gradient-to-r from-indigo-600 to-blue-600 text-white text-sm font-medium py-1.5 px-4 rounded-lg hover:from-indigo-700 hover:to-blue-700 disabled:opacity-50">
                        保存修改
                    </button>
                    <a id="yaml-download-btn" href="/api/result/{{ job_id }}"
                       class="bg-white border border-gray-300 text-gray-700 text-sm font-medium py-1.5 px-4 rounded-lg hover:bg-gray-50">
                        下载 YAML
                    </a>
                </div>
            </div>
            <div class="relative">
                <div id="yaml-cm-editor"></div>
                <div id="yaml-save-status" class="hidden absolute top-2 right-2 text-xs text-green-600 bg-green-50 px-2 py-1 rounded z-10">
                    已保存
                </div>
            </div>
        </div>

        <!-- Tab: Suggestions -->
        <div id="tab-suggestions" class="tab-content hidden p-4">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">输入您的修改建议</label>
                    <textarea id="suggestions-input"
                              class="w-full h-32 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y text-sm"
                              placeholder="例如：&#10;- 增加更多角色对白&#10;- 让场景描述更加详细&#10;- 第三幕的节奏需要加快&#10;- 角色之间的互动不够自然"></textarea>
                </div>

                <div class="flex items-center gap-3">
                    <button id="regenerate-btn"
                            class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-sm font-medium py-2 px-6 rounded-lg hover:from-purple-700 hover:to-indigo-700 disabled:opacity-50">
                        AI 重新生成
                    </button>
                    <span id="regen-status" class="text-sm text-gray-500"></span>
                </div>

                <!-- Streaming output for regeneration -->
                <div id="regen-output-container" class="hidden">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-medium text-gray-600">AI 生成结果</span>
                        <button id="apply-regen-btn"
                                class="hidden bg-green-600 text-white text-xs font-medium py-1 px-3 rounded hover:bg-green-700">
                            应用到 YAML
                        </button>
                    </div>
                    <div id="regen-output"
                         class="bg-gray-50 border border-gray-200 rounded-lg p-4 overflow-auto max-h-[50vh]">
                        <div id="regen-text" class="stream-md"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Screenplay -->
        <div id="tab-screenplay" class="tab-content hidden p-4">
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-500">将 YAML 转换为可读的正式剧本格式</span>
                    <div class="flex gap-2">
                        <button id="convert-screenplay-btn"
                                class="bg-gradient-to-r from-orange-500 to-amber-500 text-white text-sm font-medium py-1.5 px-4 rounded-lg hover:from-orange-600 hover:to-amber-600 disabled:opacity-50">
                            生成正式剧本
                        </button>
                        <button id="screenplay-toggle-edit"
                                class="hidden bg-gray-600 text-white text-sm font-medium py-1.5 px-4 rounded-lg hover:bg-gray-700">
                            编辑源码
                        </button>
                        <button id="screenplay-save-btn"
                                class="hidden bg-gradient-to-r from-indigo-600 to-blue-600 text-white text-sm font-medium py-1.5 px-4 rounded-lg hover:from-indigo-700 hover:to-blue-700 disabled:opacity-50">
                            保存修改
                        </button>
                        <button id="screenplay-download-btn"
                                class="hidden bg-white border border-gray-300 text-gray-700 text-sm font-medium py-1.5 px-4 rounded-lg hover:bg-gray-50">
                            下载剧本
                        </button>
                    </div>
                </div>

                <!-- Generate status -->
                <div id="screenplay-status" class="hidden text-sm text-gray-500 flex items-center gap-2">
                    <div class="animate-spin h-4 w-4 border-2 border-orange-600 border-t-transparent rounded-full"></div>
                    <span>正在生成剧本...</span>
                </div>

                <!-- Screenplay rendered preview (markdown) -->
                <div id="screenplay-preview" class="hidden">
                    <div class="bg-white border border-gray-200 rounded-lg p-6 overflow-auto max-h-[65vh] md-preview" id="screenplay-rendered"></div>
                </div>

                <!-- Screenplay source editor (hidden by default) -->
                <div id="screenplay-editor-wrap" class="hidden">
                    <textarea id="screenplay-editor"
                              class="w-full h-[60vh] font-mono text-sm p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y leading-relaxed"
                              spellcheck="false"></textarea>
                </div>

                <!-- Streaming output during generation -->
                <div id="screenplay-stream" class="hidden">
                    <div class="bg-gray-900 rounded-lg p-4 overflow-auto max-h-[60vh]">
                        <div id="screenplay-stream-text" class="stream-md"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const jobId = "{{ job_id }}";
</script>
<script src="/static/js/editor.js"></script>
{% endblock %}
