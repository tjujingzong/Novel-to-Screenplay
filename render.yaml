services:
  - type: web
    name: novel-to-screenplay
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false  # 需要在 Render Dashboard 中手动填入
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: DATA_DIR
        value: /data
